    .save-pill.dim { opacity: 1; font-weight: 600; }
    .warn-banner { border: 1.5px solid var(--shu); background: #FFF4F1; }
    .save-pill {
      position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
      font-size: 12px; color: #FFFFFF; letter-spacing: 0.02em;
      background: rgba(255,255,255,0.16); border: 1px solid rgba(255,255,255,0.45);
      padding: 6px 12px; border-radius: 99px;
    }

    .main { max-width: 560px; margin: 0 auto; padding: 14px 14px 20px; }
    .card {
      background: var(--paper); border: 1px solid var(--line); border-radius: 16px; box-shadow: 0 1px 3px rgba(42,51,66,0.05);
      padding: 18px 16px; margin-bottom: 14px;
    }
    .card.center { text-align: center; }
    .label { font-size: 11px; letter-spacing: 0.12em; color: var(--muted); font-weight: 700; }
    .label.red { color: var(--shu); }
    .note { font-size: 13px; color: var(--muted); line-height: 1.7; margin-top: 12px; }
    .mono { font-family: var(--mono); font-size: 12px; color: var(--muted); }

    /* hero */
    .hero-row { display: flex; justify-content: space-between; align-items: flex-start; }
    .big-num { font-family: "Bebas Neue", "Oswald", var(--mono); font-size: 68px; font-weight: 400; color: var(--ai-deep); line-height: 1; letter-spacing: 0.03em; }
    .big-unit { font-size: 18px; margin-left: 4px; color: var(--muted); font-weight: 500; }
    .date-link { background: none; border: none; color: var(--muted); font-size: 12px; text-decoration: underline; cursor: pointer; padding: 0; }
    .date-edit { display: flex; gap: 8px; margin-top: 4px; }
    .date-edit input { font-size: 13px; padding: 4px 8px; border: 1px solid var(--line); border-radius: 8px; }
    .btn-mini { font-size: 12px; padding: 4px 12px; border: none; background: var(--ai); color: #fff; border-radius: 8px; cursor: pointer; }

    .hanko {
      width: 64px; height: 64px; border-radius: 50%;
      border: 2.5px solid var(--line); color: var(--line);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--serif); font-size: 30px; font-weight: 700;
      transform: rotate(-7deg); transition: all .25s ease; flex-shrink: 0;
    }
    .hanko.on { border-color: var(--shu); color: var(--shu); box-shadow: 0 0 0 3px rgba(226,87,74,0.14); }

    .stamp-btn {
      width: 100%; margin-top: 16px; padding: 14px;
      font-size: 15px; font-weight: 700; letter-spacing: 0.04em;
      border: none; border-radius: 12px; cursor: pointer;
      background: var(--shu); color: #fff;
      transition: transform .1s ease;
    }
    .stamp-btn:active { transform: scale(0.98); }
    .stamp-btn.done { background: #FBEAE7; color: var(--shu); cursor: default; }

    .week-row { display: flex; justify-content: space-between; margin-top: 16px; }
    .week-cell { text-align: center; flex: 1; }
    .dot {
      width: 34px; height: 34px; margin: 0 auto; border-radius: 50%;
      border: 1.5px dashed var(--line); display: flex; align-items: center; justify-content: center;
      font-family: var(--serif); font-size: 14px; color: transparent;
    }
    .dot.on { border: 1.5px solid var(--shu); color: var(--shu); transform: rotate(-8deg); }
    .week-day { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-top: 4px; }
    .streak-line { font-size: 13px; color: var(--muted); margin-top: 14px; }
    .streak-line strong { color: var(--ai-deep); font-family: var(--mono); font-size: 15px; }

    /* weak */
    .card.weak { border-left: 4px solid var(--shu); }
    .weak-text { font-size: 14px; line-height: 1.8; margin: 8px 0 12px; }

    /* meter */
    .meter { margin-top: 14px; }
    .meter-head { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 6px; }
    .meter-target { color: var(--muted); }
    .bar { height: 8px; background: var(--bg); border-radius: 99px; overflow: hidden; }
    .bar-fill { height: 100%; background: var(--ai); border-radius: 99px; transition: width .4s ease; }
    .bar-fill.low { background: var(--shu); }

    /* phases */
    .phase { padding: 12px 0 4px; border-bottom: 1px solid var(--line); }
    .phase:last-of-type { border-bottom: none; }
    .phase-head { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .phase-period { font-family: var(--mono); font-size: 11px; color: var(--muted); }
    .phase-title { font-family: var(--serif); font-weight: 700; font-size: 15px; }
    .now-pill { font-size: 10px; background: var(--shu); color: #fff; padding: 2px 8px; border-radius: 99px; }
    .phase-desc { font-size: 13px; color: var(--muted); line-height: 1.7; margin-top: 4px; }
    .phase.now .phase-desc { color: var(--ink); }

    /* quiz */
    .quiz-head { display: flex; justify-content: space-between; align-items: center; }
    .q-text { font-size: 15px; line-height: 1.8; margin: 14px 0; font-weight: 600; }
    .choices { display: flex; flex-direction: column; gap: 10px; }
    .btn-skip {
      width: 100%; margin-top: 12px; padding: 11px; font-size: 13.5px; font-weight: 600;
      background: none; color: var(--muted); border: 1.5px dashed var(--line);
      border-radius: 12px; cursor: pointer; font-family: var(--sans);
    }
    .btn-skip:active { background: var(--bg); }
    .save-pill.as-btn { border: none; cursor: pointer; font-family: var(--sans); }
    .memo-fab {
      position: fixed; right: 14px; bottom: 88px; width: 52px; height: 52px;
      border-radius: 50%; border: none; background: var(--ai-deep); color: #fff;
      font-size: 22px; cursor: pointer; z-index: 60;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 14px rgba(23,41,79,0.32);
    }
    .memo-fab.open { background: var(--muted); }
    .memo-fab:active { transform: scale(0.94); }
    .memo-dot {
      position: absolute; top: 3px; right: 3px; width: 11px; height: 11px;
      border-radius: 50%; background: var(--shu); border: 2px solid #fff;
    }
    .memo-panel {
      position: fixed; right: 14px; bottom: 150px;
      width: min(340px, calc(100vw - 28px));
      background: var(--paper); border: 1px solid var(--line); border-radius: 16px;
      box-shadow: 0 10px 30px rgba(23,41,79,0.2); padding: 14px; z-index: 60;
    }
    .memo-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .memo-close { border: none; background: none; font-size: 20px; color: var(--muted); cursor: pointer; padding: 0 4px; line-height: 1; }
    .memo-ta {
      width: 100%; height: 220px; border: 1.5px solid var(--line); border-radius: 10px;
      padding: 10px; font-size: 14px; font-family: var(--sans); color: var(--ink);
      resize: none; line-height: 1.7; background: var(--bg); box-sizing: border-box;
    }
    .memo-ta:focus { outline: none; border-color: var(--ai); background: #fff; }
    .memo-hint { font-size: 10.5px; color: var(--muted); margin-top: 6px; line-height: 1.5; }
    .backup-ta {
      width: 100%; min-height: 90px; margin-top: 10px; padding: 10px;
      font-size: 11px; font-family: var(--mono); color: var(--ink);
      border: 1.5px solid var(--line); border-radius: 10px; background: var(--bg);
      resize: vertical; word-break: break-all;
    }
    .btn-main:disabled { opacity: 0.4; cursor: default; }
    .choice {
      text-align: left; padding: 13px 14px; font-size: 14px; line-height: 1.6;

      cursor: pointer; color: var(--ink); font-family: var(--sans);

    .choice.correct { border-color: var(--ok); background: #E8F5EF; font-weight: 700; }

    .expl-head { font-family: var(--serif); font-weight: 700; font-size: 15px; margin-bottom: 6px; }

    .expl-head.ng { color: var(--shu); }
    .expl p { font-size: 13.5px; line-height: 1.8; }

      font-size: 12.5px; padding: 7px 12px; border-radius: 99px;
      border: 1px solid var(--line); background: var(--paper); color: var(--muted); cursor: pointer;

    .btn-main {
      width: 100%; margin-top: 14px; padding: 13px; font-size: 15px; font-weight: 700;
      background: var(--ai-deep); color: #fff; border: none; border-radius: 12px; cursor: pointer;
    }
    .btn-sub {
      padding: 9px 16px; font-size: 13px; font-weight: 600;
      background: var(--paper); color: var(--ai-deep); border: 1.5px solid var(--ai-deep);
      border-radius: 10px; cursor: pointer;
    }

    /* cards */
    .toggle-row { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--muted); margin-bottom: 14px; cursor: pointer; }
    .flashcard {

      background: linear-gradient(180deg, #FFFFFF 0%, #F1F5FA 100%);

    .fc-cat { font-family: var(--mono); font-size: 11px; color: var(--muted); }

    .fc-btns { display: flex; gap: 10px; margin-top: 12px; }
    .btn-ng, .btn-ok { flex: 1; padding: 13px; font-size: 15px; font-weight: 700; border-radius: 12px; cursor: pointer; border: none; }
    .btn-ng { background: var(--bg); color: var(--muted); border: 1.5px solid var(--line); }
    .btn-ok { background: var(--ok); color: #fff; }
    .empty { padding: 32px 10px; text-align: center; font-size: 13.5px; color: var(--muted); line-height: 1.9; }

    /* search */
    .search-input {
      width: 100%; padding: 11px 14px; margin: 14px 0 10px;

      -webkit-appearance: none; appearance: none;
    }
    .search-input:focus { outline: none; border-color: var(--ai); }
    .sr { padding: 12px 0; border-bottom: 1px dashed var(--line); }
    .sr-term { font-family: var(--serif); font-weight: 700; font-size: 15px; color: var(--ai-deep); margin-bottom: 4px; }
    .sr-cat { font-family: var(--mono); font-size: 10px; color: var(--muted); font-weight: 400; margin-left: 8px; }
    .sr-def { font-size: 13px; line-height: 1.8; color: var(--ink); }
    .sr-ans { font-size: 13px; line-height: 1.8; color: var(--ok); margin-top: 2px; }
    .sr-ex { font-size: 12px; line-height: 1.7; color: var(--muted); margin-top: 4px; }

    /* afternoon */
    .pm-card { padding: 0; overflow: hidden; }
    .pm-head {
      width: 100%; display: flex; justify-content: space-between; align-items: center;
      padding: 15px 16px; background: none; border: none; cursor: pointer; font-family: var(--sans);
    }
    .pm-tag {
      font-size: 10px; font-weight: 700; color: var(--shu); border: 1px solid var(--shu);
      padding: 2px 7px; border-radius: 99px; margin-right: 8px; vertical-align: 2px;
    }
    .pm-tag.read { color: var(--ok); border-color: var(--ok); }
    .pm-title { font-family: var(--serif); font-size: 15px; font-weight: 700; color: var(--ink); }
    .pm-arrow { font-size: 20px; color: var(--muted); }
    .pm-body { padding: 0 16px 16px; }
    .pm-body ul { list-style: none; }
    .pm-body li {
      font-size: 13.5px; line-height: 1.85; padding: 10px 0 10px 16px; position: relative;
      border-bottom: 1px dashed var(--line);
    }
    .pm-body li::before { content: "\u30FB"; position: absolute; left: 0; color: var(--shu); font-weight: 700; }

    /* tabbar */
    .tabbar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--paper); border-top: 1px solid var(--line);
      display: flex; justify-content: space-around; padding: 6px 0 10px;
      max-width: 100%;
    }
    .tab {
      background: none; border: none; cursor: pointer; padding: 4px 16px;
      display: flex; flex-direction: column; align-items: center; gap: 2px; color: var(--muted);
    }
    .tab-glyph {
      font-family: var(--serif); font-size: 17px; font-weight: 700;
      width: 32px; height: 32px; border-radius: 50%; border: 1.5px solid transparent;
      display: flex; align-items: center; justify-content: center;
    }
    .tab.on { color: var(--ai-deep); }
    .tab.on .tab-glyph { border-color: var(--shu); color: var(--shu); transform: rotate(-7deg); }
    .tab-label { font-size: 10px; font-weight: 600; }

    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; }
    }
